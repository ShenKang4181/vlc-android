name: Build VLC Android APK

on:
  workflow_dispatch:  # 仅手动触发
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
        - debug
        - release

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: android-opensdk:latest  # 你需要构建或找到合适的 Docker 镜像
      
    steps:
    - name: Clone VLC Android
      run: |
        git clone --recursive https://github.com/videolan/vlc-android.git
        cd vlc-android
        
    - name: Build APK
      working-directory: /vlc-android
      run: |
        # 配置环境
        export ANDROID_SDK_ROOT=/opt/android-sdk
        export ANDROID_NDK_ROOT=/opt/android-ndk
        
        # 运行构建
        ./compile.sh
        
    - name: Store APK
      uses: actions/upload-artifact@v4
      with:
        name: VLC-Android-APK
        path: vlc-android/build/outputs/apk/
