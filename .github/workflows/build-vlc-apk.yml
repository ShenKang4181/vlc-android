name: Build VLC for Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: /usr/local/android-sdk
      # 注意：新版setup-android会自动设置NDK路径，无需硬编码
      VLC_ARCH: arm64-v8a

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt update && sudo apt install -y \
            autoconf \
            automake \
            build-essential \
            cmake \
            curl \
            git \
            libtool \
            pkg-config \
            python3 \
            python3-pip \
            unzip \
            wget \
            yasm \
            zip \
            zlib1g-dev
          # 新增：临时扩容交换内存，避免编译内存不足
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      # ========== 关键修改：修正setup-android的参数格式 ==========
      - name: Set up Android SDK/NDK
        uses: android-actions/setup-android@v3
        with:
          # 必选：指定cmdline-tools版本（推荐latest）
          cmdline-tools-version: 'latest'
          # 核心修改：通过packages声明所有需要的Android组件
          packages: |
            platforms;android-33          # API 33（VLC要求）
            build-tools;33.0.2            # Build-Tools版本
            ndk;25.2.9519653              # NDK r25c（VLC兼容版本）
          # 自动接受SDK许可（保留）
          accept-android-sdk-licenses: true

      # ========== 关键修改：重新获取NDK实际路径 ==========
      - name: Get NDK path and configure env
        run: |
          # 查找安装的NDK实际路径（新版setup-android会把NDK放在sdk/ndk/版本号目录）
          NDK_PATH=$(find $ANDROID_SDK_ROOT/ndk -maxdepth 1 -type d | grep -E '25.2.9519653' | head -1)
          # 输出路径用于验证
          echo "NDK实际路径: $NDK_PATH"
          # 设置环境变量，供VLC编译脚本使用
          echo "ANDROID_NDK=$NDK_PATH" >> $GITHUB_ENV
          echo "NDK_ROOT=$NDK_PATH" >> $GITHUB_ENV
          # 创建软链接（兼容VLC编译脚本的路径预期）
          sudo ln -s $NDK_PATH /usr/local/android-ndk
          echo "ANDROID_NDK=/usr/local/android-ndk" >> $GITHUB_ENV

      - name: Build VLC APK
        run: |
          cd $GITHUB_WORKSPACE
          chmod +x compile.sh
          # 编译前输出环境变量，便于调试
          echo "ANDROID_NDK: $ANDROID_NDK"
          echo "VLC_ARCH: $VLC_ARCH"
          # 执行编译
          ./compile.sh -a $VLC_ARCH

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vlc-android-${{ env.VLC_ARCH }}-apk
          path: |
            $GITHUB_WORKSPACE/bin/*/*.apk
            $GITHUB_WORKSPACE/bin/*/*.apks
          retention-days: 90
