name: Build VLC Android APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            autopoint \
            cmake \
            build-essential \
            libtool \
            patch \
            pkg-config \
            protobuf-compiler \
            ragel \
            subversion \
            unzip \
            git \
            wget

      - name: Setup environment
        run: |
          echo "ANDROID_SDK=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          # 配置 Git 身份，用于应用 VLC 补丁
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Build native libraries
        run: |
          ./buildsystem/compile.sh -a armeabi-v7a
        env:
          ANDROID_SDK: ${{ env.ANDROID_SDK }}
          ANDROID_NDK: ${{ env.ANDROID_NDK }}
          GIT_COMMITTER_NAME: GitHub Actions
          GIT_COMMITTER_EMAIL: github-actions@github.com
          GIT_AUTHOR_NAME: GitHub Actions
          GIT_AUTHOR_EMAIL: github-actions@github.com
        timeout-minutes: 120

      - name: Build APK (Debug)
        if: github.event.inputs.build_type != 'release'
        run: |
          ./gradlew assembleDebug
        env:
          ANDROID_SDK: ${{ env.ANDROID_SDK }}

      - name: Build APK (Release)
        if: github.event.inputs.build_type == 'release'
        run: |
          ./gradlew assembleRelease
        env:
          ANDROID_SDK: ${{ env.ANDROID_SDK }}

      - name: Upload Debug APK
        if: github.event.inputs.build_type != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: vlc-android-debug
          path: |
            application/app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload Release APK
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: vlc-android-release
          path: |
            application/app/build/outputs/apk/release/*.apk
          retention-days: 30
